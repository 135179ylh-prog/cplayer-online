name: Deploy GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install locked dependencies
        run: npm ci
      - name: Install Chromium for browser regression
        run: npx playwright install --with-deps chromium
      - name: Run release quality gate
        run: npm run verify
  deploy:
    needs: quality
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare Pages artifact
        run: |
          site_dir="$RUNNER_TEMP/cplayer-pages"
          mkdir -p "$site_dir"
          cp index.html manifest.json playlist.js playlist-downloader.html sw.js "$site_dir/"
          cp -R css fonts img js webfonts "$site_dir/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/cplayer-pages
      - id: deployment
        uses: actions/deploy-pages@v4
