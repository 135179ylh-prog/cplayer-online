name: Deploy GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare Pages artifact
        run: |
          site_dir="$RUNNER_TEMP/cplayer-pages"
          mkdir -p "$site_dir"
          cp index.html manifest.json playlist.js playlist-downloader.html sw.js "$site_dir/"
          cp -R css fonts img js webfonts "$site_dir/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/cplayer-pages
      - id: deployment
        uses: actions/deploy-pages@v4
